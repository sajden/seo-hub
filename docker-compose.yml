services:
  article-generator:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: article-generator
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"
    environment:
      SEO_HUB_PORT: 3001
      SEO_HUB_BASE_PATH: /api/seo-hub
      TZ: Europe/Stockholm
      SEO_HUB_CODEX_URL: http://host.docker.internal:8090/v1/iterations/run
      SEO_HUB_CODEX_WORKSPACE_PATH: /workspace
      GIT_AUTHOR_NAME: Sebastian Catwall
      GIT_AUTHOR_EMAIL: sebastian.catwall@gmail.com
      GIT_COMMITTER_NAME: Sebastian Catwall
      GIT_COMMITTER_EMAIL: sebastian.catwall@gmail.com
    ports:
      - "127.0.0.1:3001:3001"
    volumes:
      - .:/app
      - article_generator_node_modules:/app/node_modules
      - ../sebcastwall:/home/sajden/github/sebcastwall
      - /home/sajden/.ssh:/root/.ssh:ro

volumes:
  article_generator_node_modules:
